<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Effort Workbook Auditor</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      :root {
        --bg: #eef4eb;
        --panel: #fbfdf8;
        --line: #d2dcd0;
        --ink: #1f2e24;
        --muted: #657469;
        --excel: #217346;
        --excel-dark: #175434;
        --soft: #edf4ef;
        --soft-strong: #e6f1e8;
        --warn: #fff3d7;
        --danger: #fde8e8;
        --overlay: rgba(18, 25, 21, 0.42);
      }
      * { box-sizing: border-box; }
      html, body, #root { min-height: 100%; }
      body {
        margin: 0;
        font-family: Calibri, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f3f7f1 0%, #edf3ea 100%);
        color: var(--ink);
      }
      button, input, select, textarea { font: inherit; }
      .shell { min-height: 100vh; display: grid; grid-template-rows: auto auto 1fr; }
      .top {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(135deg, #fafdfa 0%, #edf5ef 100%);
      }
      .top h1 { margin: 0; font-size: 20px; }
      .top p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
      .statusbar {
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,0.92);
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--excel); flex: 0 0 auto; }
      .content { padding: 14px 16px 20px; display: grid; gap: 14px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
      }
      .panel-head {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fbfffb 0%, #f1f7f2 100%);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .panel-body { padding: 14px; display: grid; gap: 12px; }
      .tiny { font-size: 12px; color: var(--muted); }
      .muted { color: var(--muted); }
      .row { display: flex; flex-wrap: wrap; gap: 8px; }
      .row.between { justify-content: space-between; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .field { display: grid; gap: 6px; }
      .field label { font-size: 12px; color: var(--muted); font-weight: 700; }
      .field input, .field select, .field textarea {
        width: 100%;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: white;
      }
      .field textarea { min-height: 86px; resize: vertical; }
      .btn {
        border: 1px solid var(--excel);
        background: var(--excel);
        color: white;
        padding: 9px 13px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.secondary { background: white; color: var(--excel-dark); border-color: var(--line); }
      .btn.ghost { background: transparent; color: var(--excel-dark); border-color: var(--line); }
      .btn.danger { background: #b33535; border-color: #b33535; color: white; }
      .btn.sm { padding: 6px 9px; font-size: 12px; border-radius: 8px; }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--soft);
        font-size: 11px;
        font-weight: 700;
      }
      .badge.warn { background: var(--warn); }
      .badge.danger { background: var(--danger); }
      .empty {
        padding: 16px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        color: var(--muted);
        background: rgba(255,255,255,0.84);
      }
      .empty strong { display: block; color: var(--ink); margin-bottom: 6px; }
      .process-grid, .sheet-list, .file-list, .issue-list, .notification-list, .history-list, .compare-list { display: grid; gap: 10px; }
      .process-card, .file-card, .sheet-card, .notification-card, .history-card, .compare-card, .issue-card, .metric {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: white;
        padding: 12px;
      }
      .process-card.active { border-color: var(--excel); box-shadow: inset 0 0 0 1px var(--excel); background: #f8fcf9; }
      .process-card-header { display: flex; justify-content: space-between; gap: 8px; align-items: start; }
      .process-actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .process-meta, .notification-meta, .issue-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
      .view { display: grid; gap: 14px; }
      .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
      .tab {
        border: 1px solid var(--line);
        background: #f2f6f1;
        color: var(--ink);
        padding: 8px 12px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
      }
      .tab.active { background: var(--excel); border-color: var(--excel); color: white; }
      .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .metric .label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
      .metric .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
      .sheet-card { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
      .issue-card.high { border-left: 5px solid #cf3d43; }
      .issue-card.medium { border-left: 5px solid #d7a31a; }
      .issue-card.low { border-left: 5px solid #6d9c55; }
      .preview {
        margin-top: 10px;
        max-height: 180px;
        overflow: auto;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: #fafdfa;
        padding: 8px;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: var(--overlay);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 1000;
      }
      .modal {
        width: min(560px, 100%);
        background: white;
        border-radius: 16px;
        border: 1px solid var(--line);
        box-shadow: 0 14px 28px rgba(20, 32, 25, 0.22);
        overflow: hidden;
      }
      .modal-body { padding: 14px; display: grid; gap: 12px; }
      .workspace-header { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
      .source-banner {
        border: 1px solid #bdd5c4;
        background: #f4faf6;
        border-radius: 12px;
        padding: 12px;
      }
      @media (max-width: 640px) {
        .grid2, .grid3, .metric-grid { grid-template-columns: 1fr; }
        .process-card-header, .workspace-header, .row.between { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/taskpane.js"></script>
  </body>
</html>
