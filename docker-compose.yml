# Local dev Postgres + Redis. Workbook bytes are stored in Postgres (BYTEA), not S3.
# Sizing: each concurrent upload holds the file in API memory until persisted — plan for
# roughly (max concurrent uploads × max workbook size). Default API limit is 25 MiB per file;
# leave headroom on Postgres `shared_buffers` / host RAM if many users upload at once.
services:
  postgres:
    image: postgres:16-alpine
    container_name: ses-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ses
      POSTGRES_PASSWORD: ses
      POSTGRES_DB: ses
    ports:
      - '5432:5432'
    volumes:
      - ses_pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-ses-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ses -d ses']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ses-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - ses_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ses_pg_data:
  ses_redis_data:
