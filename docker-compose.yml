# Local dev: Postgres + Redis + MinIO (S3-compatible object store).
# AI Pilot uploads land in MinIO; only metadata lives in Postgres.
# Production swaps MinIO for AWS S3 by changing OBJECT_STORAGE_* env vars only — no code change.
#
# Distinct Compose project name so `docker compose up`/`down` here can never
# recreate or tear down the production stack (project name: ses, from
# docker-compose.prod.yml). Without this both files share the directory-derived
# project "ses" and the dev `up` silently clobbers the prod containers.
name: ses-dev
services:
  postgres:
    image: postgres:16-alpine
    container_name: ses-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ses
      POSTGRES_PASSWORD: ses
      POSTGRES_DB: ses
    ports:
      - '5432:5432'
    volumes:
      - ses_pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-ses-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ses -d ses']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ses-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - ses_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: ses-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # web console
    volumes:
      - ses_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10

  # Idempotent bucket bootstrap. Creates all three buckets used by the
  # app (workbooks, ai-pilot, pdfs). Exits 0 once each bucket exists.
  # Safe to re-run on every `up`.
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: ses-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}:${OBJECT_STORAGE_SECRET_KEY:-minioadmin}@minio:9000
      BUCKET_WORKBOOKS: ${OBJECT_STORAGE_BUCKET_WORKBOOKS:-ses-workbooks}
      BUCKET_AI_PILOT: ${OBJECT_STORAGE_BUCKET_AI_PILOT:-ses-ai-files}
      BUCKET_PDFS: ${OBJECT_STORAGE_BUCKET_PDFS:-ses-ai-pdfs}
    entrypoint: >
      /bin/sh -c "
      mc mb --ignore-existing local/$$BUCKET_WORKBOOKS &&
      mc mb --ignore-existing local/$$BUCKET_AI_PILOT &&
      mc mb --ignore-existing local/$$BUCKET_PDFS &&
      mc anonymous set none local/$$BUCKET_WORKBOOKS &&
      mc anonymous set none local/$$BUCKET_AI_PILOT &&
      mc anonymous set none local/$$BUCKET_PDFS &&
      echo buckets-ready: $$BUCKET_WORKBOOKS $$BUCKET_AI_PILOT $$BUCKET_PDFS
      "
    restart: 'no'

  # AI sidecar (FastAPI + Ollama client). Runs the rule-generation flow AND
  # the new analytics chat agent. Talks to a host-installed Ollama at the
  # default 11434 — pass `--add-host=host.docker.internal:host-gateway` on
  # Linux if your daemon doesn't already wire that for you.
  #
  # Note for nginx fronting: set `proxy_buffering off` for /api/v1/analytics/chat
  # so SSE streams reach the browser without buffering.
  ai-sidecar:
    profiles: ['ai']
    build:
      context: ./services/ai-sidecar
    container_name: ses-ai-sidecar
    # F2/F20: bind to loopback only. The sidecar has no auth yet (Phase 1.2),
    # so it must not be reachable from the LAN/other containers' host iface.
    # Local smoke tests still reach it via 127.0.0.1:8000.
    ports:
      - '127.0.0.1:8000:8000'
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      AI_AGENT_MODEL: ${AI_AGENT_MODEL:-qwen2.5-coder:7b-instruct}
      AI_ROUTER_MODEL: ${AI_ROUTER_MODEL:-llama3.2:3b}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-nomic-embed-text}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ses_pg_data:
  ses_redis_data:
  ses_minio_data:
