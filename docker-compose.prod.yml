# Explicit project name. Pairs with `name: ses-dev` in docker-compose.yml so
# the dev and prod stacks are fully isolated Compose projects — neither can
# recreate or down the other's containers/volumes.
name: ses
services:
  postgres:
    image: postgres:16-alpine
    container_name: ses-postgres-prod
    restart: unless-stopped
    environment:
      # F5: no default credentials in prod. `:?` makes Compose fail closed
      # (refuse `up`) if these are unset/empty in .deploy.env.
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .deploy.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .deploy.env}
      POSTGRES_DB: ${POSTGRES_DB:-ses}
    # F5: do NOT publish 5432 to the host in prod. The API reaches Postgres
    # over the internal ses-network only. Re-enable behind a bastion if
    # operational access is genuinely required.
    expose:
      - '5432'
    volumes:
      - ses_pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ses-network

  redis:
    image: redis:7-alpine
    container_name: ses-redis-prod
    restart: unless-stopped
    # F18: require a password. Anything on ses-network could otherwise
    # read/write the Socket.IO pub/sub stream. Fail closed if unset.
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .deploy.env}',
      ]
    volumes:
      - ses_redis_data_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - ses-network

  # S3-compatible object store. The API uploads workbooks, AI-pilot files,
  # and generated PDFs here. Same image/endpoint shape as production AWS S3 —
  # only env vars change to point at the real S3 in a cloud deploy.
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: ses-minio-prod
    restart: unless-stopped
    environment:
      # F5: no default object-storage credentials in prod.
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY must be set in .deploy.env}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY must be set in .deploy.env}
    command: server /data --console-address ":9001"
    volumes:
      - ses_minio_data_prod:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - ses-network

  # Idempotent bucket bootstrap: creates the three buckets the API expects.
  # Exits 0 once each bucket exists. Safe to re-run on every `up`.
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: ses-minio-init-prod
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://${OBJECT_STORAGE_ACCESS_KEY:?OBJECT_STORAGE_ACCESS_KEY must be set}:${OBJECT_STORAGE_SECRET_KEY:?OBJECT_STORAGE_SECRET_KEY must be set}@minio:9000
      BUCKET_WORKBOOKS: ${OBJECT_STORAGE_BUCKET_WORKBOOKS:-ses-workbooks}
      BUCKET_AI_PILOT: ${OBJECT_STORAGE_BUCKET_AI_PILOT:-ses-ai-files}
      BUCKET_PDFS: ${OBJECT_STORAGE_BUCKET_PDFS:-ses-ai-pdfs}
    entrypoint: >
      /bin/sh -c "
      mc mb --ignore-existing local/$$BUCKET_WORKBOOKS &&
      mc mb --ignore-existing local/$$BUCKET_AI_PILOT &&
      mc mb --ignore-existing local/$$BUCKET_PDFS &&
      mc anonymous set none local/$$BUCKET_WORKBOOKS &&
      mc anonymous set none local/$$BUCKET_AI_PILOT &&
      mc anonymous set none local/$$BUCKET_PDFS &&
      echo buckets-ready
      "
    restart: 'no'
    networks:
      - ses-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-build
    environment:
      NODE_ENV: production
      # F5: DB URL is derived from the same credential vars Postgres uses.
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ses}
      # F8: no weak fallback. Compose refuses `up` if SES_AUTH_SECRET_DOCKER
      # is unset/empty. Length/entropy is additionally enforced at API startup.
      SES_AUTH_SECRET: ${SES_AUTH_SECRET_DOCKER:?SES_AUTH_SECRET_DOCKER must be set to a 32+ char random secret in .deploy.env}
    command: ['npm', 'run', 'db:migrate', '--workspace', '@ses/api']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks:
      - ses-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3211
      # F5: DB URL derived from the same credential vars Postgres uses.
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ses}
      # F18: authenticated Redis URL (password from the same var redis uses).
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      # F8: no weak fallback — fail closed if unset/empty.
      SES_AUTH_SECRET: ${SES_AUTH_SECRET_DOCKER:?SES_AUTH_SECRET_DOCKER must be set to a 32+ char random secret in .deploy.env}
      SES_CORS_ORIGINS: ${SES_CORS_ORIGINS:-http://localhost:3210,http://127.0.0.1:3210}
      SES_BASE_URL: ${SES_BASE_URL:-http://localhost:3210}
      # F6: prod runs behind an HTTPS edge (Cloudflare tunnel / nginx).
      # Default to secure cookies; only override to false for a deliberate
      # plain-HTTP test environment.
      SES_COOKIE_SECURE: ${SES_COOKIE_SECURE:-true}
      SES_COOKIE_SAMESITE: ${SES_COOKIE_SAMESITE:-lax}
      # Default to the in-compose sidecar. Override AI_SERVICE_URL_DOCKER
      # to point at an external sidecar (e.g. a GPU host on the same VPN).
      AI_SERVICE_URL: ${AI_SERVICE_URL_DOCKER:-http://ai-sidecar:8000}
      # F2: shared secret the API presents to the sidecar. Fail closed —
      # both API and sidecar refuse to operate if this is unset.
      SIDECAR_SHARED_SECRET: ${SIDECAR_SHARED_SECRET:?SIDECAR_SHARED_SECRET must be set to a 32+ char random secret in .deploy.env}
      # Object storage. Defaults target the in-compose MinIO. To use AWS S3
      # instead, set OBJECT_STORAGE_ENDPOINT to empty and provide real
      # OBJECT_STORAGE_REGION + access/secret keys via .deploy.env.
      OBJECT_STORAGE_DRIVER: s3
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_BUCKET_WORKBOOKS: ${OBJECT_STORAGE_BUCKET_WORKBOOKS:-ses-workbooks}
      OBJECT_STORAGE_BUCKET_AI_PILOT: ${OBJECT_STORAGE_BUCKET_AI_PILOT:-ses-ai-files}
      OBJECT_STORAGE_BUCKET_PDFS: ${OBJECT_STORAGE_BUCKET_PDFS:-ses-ai-pdfs}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    expose:
      - '3211'
    networks:
      - ses-network

  ollama:
    image: ollama/ollama:latest
    container_name: ses-ollama-prod
    restart: unless-stopped
    environment:
      # Keep the analytics model resident between requests so the first
      # chat after idle doesn't pay the multi-second cold-load cost.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
    volumes:
      - ses_ollama_models:/root/.ollama
    healthcheck:
      # The default Ollama image doesn't ship curl/wget; use the ollama CLI
      # itself (always present) which exits 0 when the daemon is reachable.
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - ses-network
    # Uncomment to expose Ollama for direct host access (debug only).
    # ports: ['11434:11434']
    #
    # GPU support: requires nvidia-container-toolkit on the host.
    # Uncomment the deploy block below and set OLLAMA_GPU=1 in .deploy.env.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ['gpu']

  ai-sidecar:
    build:
      context: ./services/ai-sidecar
    container_name: ses-ai-sidecar-prod
    restart: unless-stopped
    # F3/F16: shrink the blast radius of the LLM-SQL / document-parser
    # surface. Non-root (Dockerfile), no privilege escalation, all caps
    # dropped, read-only root filesystem with a small writable tmpfs only
    # for the sandbox the uploader needs.
    user: '10001:10001'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /home/appuser/ses-ai-sandbox:size=128m,mode=1700
      - /tmp:size=64m
    environment:
      # F2: same shared secret the API presents. Sidecar fails closed (503)
      # on every non-health route if this is unset.
      SIDECAR_SHARED_SECRET: ${SIDECAR_SHARED_SECRET:?SIDECAR_SHARED_SECRET must be set to a 32+ char random secret in .deploy.env}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      # Analytics chat models (router/agent are deliberately small for speed).
      AI_AGENT_MODEL: ${AI_AGENT_MODEL:-llama3.2:3b}
      AI_ROUTER_MODEL: ${AI_ROUTER_MODEL:-llama3.2:3b}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-nomic-embed-text}
      # AI Pilot rule generator (larger model — better at producing valid JSON
      # rule specs). Enhancer reuses the small agent model to avoid pulling a
      # third 4–5 GB model just for short prompt rewrites.
      AI_MODEL: ${AI_MODEL:-qwen2.5:7b}
      AI_ENHANCE_MODEL: ${AI_ENHANCE_MODEL:-llama3.2:3b}
    depends_on:
      ollama:
        condition: service_healthy
    expose:
      - '8000'
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8000/health\",timeout=2).status==200 else 1)" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ses-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3210:3210'
    networks:
      - ses-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ses-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:-}
    depends_on:
      web:
        condition: service_started
    networks:
      - ses-network
    profiles:
      - tunnel

volumes:
  ses_pg_data_prod:
  ses_redis_data_prod:
  ses_ollama_models:
  ses_minio_data_prod:

networks:
  ses-network:
    name: ses-network
    driver: bridge
