<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>SES - Smart Escalation System</title>
    <style>
      #ses-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: linear-gradient(135deg, #fff1f2 0%, #fafafa 55%, #eef2ff 100%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #111827;
        z-index: 9999;
      }
      #ses-splash .logo {
        height: 56px;
        width: auto;
        display: block;
        /* Soft drop shadow that works on both light and dark backgrounds. */
        filter: drop-shadow(0 8px 20px rgba(15, 23, 42, 0.18));
      }
      #ses-splash .title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      #ses-splash .subtitle {
        font-size: 12px;
        color: #6b7280;
        margin-top: -6px;
      }
      #ses-splash .dots {
        display: inline-flex;
        gap: 6px;
        margin-top: 4px;
      }
      #ses-splash .dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #e11d48;
        opacity: 0.35;
        animation: ses-pulse 1.1s ease-in-out infinite;
      }
      #ses-splash .dots span:nth-child(2) { animation-delay: 0.18s; }
      #ses-splash .dots span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes ses-pulse {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="ses-splash" role="status" aria-live="polite">
        <img class="logo" src="/msg-logo.png" alt="msg" />
        <div class="title">Smart Escalation System</div>
        <div class="subtitle">Getting things ready…</div>
        <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
