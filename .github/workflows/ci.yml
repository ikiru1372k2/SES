name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: ses
          POSTGRES_PASSWORD: ses
          POSTGRES_DB: ses
        options: >-
          --health-cmd "pg_isready -U ses -d ses"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: bitnami/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: ci-access-key
          MINIO_ROOT_PASSWORD: ci-secret-key-32chars-min-length-ok
          MINIO_DEFAULT_BUCKETS: ses-ci
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://ses:ses@127.0.0.1:5432/ses
      SES_AUTH_SECRET: ses-ci-secret-0123456789abcdef0123456789abcdef
      SES_ALLOW_DEV_LOGIN: 'true'
      OBJECT_STORAGE_DRIVER: s3
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ACCESS_KEY: ci-access-key
      OBJECT_STORAGE_SECRET_KEY: ci-secret-key-32chars-min-length-ok
      OBJECT_STORAGE_BUCKET: ses-ci
      OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:9000
      OBJECT_STORAGE_FORCE_PATH_STYLE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify lockfile is in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json
      - run: npm ci
      - name: Apply database migrations
        run: npm run db:migrate --workspace @ses/api
      - name: Build domain and seed database
        run: npm run build --workspace @ses/domain && npm run db:seed --workspace @ses/api
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: API end-to-end tests
        run: npm run test:e2e --workspace @ses/api
      - run: npm run test:components
      - run: npm audit --audit-level=high
      - run: npm run build
