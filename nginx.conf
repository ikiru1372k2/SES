server {
  listen 3210;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  resolver 127.0.0.11 ipv6=off valid=30s;
  set $api_upstream http://api:3211;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  # F12: cap request bodies at the largest upload the API accepts
  # (MAX_WORKBOOK_FILE_SIZE_BYTES = 25 MB) plus multipart overhead.
  client_max_body_size 26m;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  # Shared proxy settings for the API. Buffering stays ON here (default) so
  # regular JSON responses are buffered; only the streaming routes below
  # opt out. WebSocket upgrade headers are NOT set here — they are scoped
  # to the realtime path only (F12).
  location /api/ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # F4 interim: signed-link tokens are a path segment here. Keep them out of
  # the nginx access log until the token moves out of the URL (Phase 1.6).
  location ^~ /api/v1/public/respond/ {
    access_log off;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # F12: SSE analytics chat — disable response buffering for this path ONLY
  # so tokens stream to the browser without nginx holding them back.
  location ~ ^/api/v1/analytics/processes/[^/]+/chat$ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
  }

  # F12: WebSocket upgrade is scoped to the realtime path only.
  location /api/v1/realtime {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
